<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz cumpleaños Lola</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0c29);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

#start {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 20px;
    background: #ff4d6d;
    color: white;
    margin-top: 20px;
}

.container {
    display: none;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    margin: 15px auto;
    padding: 18px;
    border-radius: 16px;
    max-width: 90%;
    backdrop-filter: blur(12px);
    animation: fadeIn 1.5s ease;
}

img {
    width: 100%;
    border-radius: 16px;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.glow {
    position: fixed;
    width: 200px;
    height: 200px;
    background: #ff4d6d;
    filter: blur(120px);
    opacity: 0.2;
    top: 20%;
    left: 10%;
}

.glow2 {
    position: fixed;
    width: 200px;
    height: 200px;
    background: #4cc9f0;
    filter: blur(120px);
    opacity: 0.2;
    bottom: 10%;
    right: 10%;
}
</style>
</head>

<body>

<!-- музыка -->
<audio id="music" loop>
    <source src="Feliz%20Cumpleaños,%20Lola.mp3" type="audio/mpeg">
</audio>

<div class="glow"></div>
<div class="glow2"></div>

<div id="start">
    <h1>Para Lola 💖</h1>
    <p style="opacity:0.7;">Toca para abrir tu sorpresa</p>
    <button onclick="startSite()">Abrir ✨</button>
</div>

<div class="container" id="content">

    <h1>Feliz cumpleaños, Lola 🎉</h1>

    <div class="card">Sos una persona única en este mundo 💫</div>
    <div class="card">Tu energía cambia todo a mejor ✨</div>
    <div class="card">Gracias por existir 💖</div>

    <div class="card">
        <img src="1.jpg">
    </div>

    <div class="card">
        <img src="2.jpg">
    </div>

    <div class="card">
        <img src="3.jpg">
    </div>

    <div class="card">
        <h2>Te deseo felicidad, amor y calma hoy y siempre 🌙</h2>
    </div>

</div>

<script>
function startSite() {
    document.getElementById("start").style.display = "none";
    document.getElementById("content").style.display = "block";
    document.getElementById("music").play();
}
</script>

</body>
</html>
