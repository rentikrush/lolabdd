<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños, Lola 💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
    overflow:hidden;
}

.bg{
    position:fixed;
    inset:0;
    z-index:-1;
}

.bg img{
    position:absolute;
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:16px;
    opacity:.18;
    border:3px solid rgba(255,255,255,.7);
    animation:float 18s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.card{
    max-width:500px;
    background:rgba(0,0,0,.5);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:25px;
}

h1{
    margin-bottom:20px;
}

#text{
    font-size:22px;
    min-height:90px;
    margin-bottom:20px;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:12px;
    background:#ff4d8d;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

#final{
    display:none;
    margin-top:15px;
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    text-align:center;
}

a{
    display:none;
    margin-top:15px;
    color:#ff4d8d;
    font-weight:bold;
    text-decoration:none;
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="Feliz Cumpleaños, Lola.mp3" type="audio/mpeg">
</audio>

<div class="bg" id="bg"></div>

<div class="container">
    <div class="card">
        <h1>Para Lola 💖</h1>

        <div id="text"></div>

        <button id="nextBtn" onclick="next()">Seguir</button>

        <div id="final">
            🎧 Escuchá la canción…<br><br>

            🔐 Código secreto:<br>
            <input id="code" placeholder="Ingresá el código"><br>
            <button onclick="checkCode()">Entrar</button><br>

            <a id="link" href="https://t.me/" target="_blank">
                👉 Abrir sorpresa en Telegram
            </a>
        </div>
    </div>
</div>

<script>
const images = ["1.jpg","2.jpg","3.jpg","4.jpg"];

const bg = document.getElementById("bg");

for(let i=0;i<20;i++){
    const img = document.createElement("img");
    img.src = images[Math.floor(Math.random()*images.length)];
    img.style.left = Math.random()*100 + "%";
    img.style.top = Math.random()*100 + "%";
    bg.appendChild(img);
}

const texts = [
"Hola, Lola 💖",
"Hoy es un día muy especial.",
"Tenés una sonrisa hermosa ✨",
"Tu energía hace todo mejor 🌸",
"Sos una persona increíble 💖",
"Nunca pierdas tu luz.",
"Feliz cumpleaños 🎂"
];

let i = 0;

const text = document.getElementById("text");
const final = document.getElementById("final");
const btn = document.getElementById("nextBtn");

function show(){
    text.innerText = texts[i];
}

function next(){
    if(i < texts.length - 1){
        i++;
        show();
    } else {
        text.style.display = "none";
        btn.style.display = "none";
        final.style.display = "block";
    }
}

show();

// музыка после клика
document.body.addEventListener("click", function(){
    document.getElementById("music").play().catch(()=>{});
}, { once:true });

// код
function checkCode(){
    const value = document.getElementById("code").value;

    if(value === "Lola2026"){
        document.getElementById("link").style.display = "block";
    } else {
        alert("Código incorrecto 💔");
    }
}
</script>

</body>
</html>
