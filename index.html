<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Лолы</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
}

/* фон с фотками */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  z-index: -1;
}

.bg img {
  position: absolute;
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 15px;
  opacity: 0.25;
  filter: blur(0.5px);
}

/* центр контент */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.card {
  max-width: 500px;
}

h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

p {
  font-size: 20px;
  min-height: 60px;
}

/* кнопка */
button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #ff2f55;
}
</style>
</head>

<body>

<!-- фон -->
<div class="bg" id="bg"></div>

<!-- контент -->
<div class="container">
  <div class="card">
    <h1>Для Лолы 💖</h1>
    <p id="text">...</p>
    <button onclick="next()">Продолжить</button>
  </div>
</div>

<script>
// фоновые картинки (можешь заменить)
const images = [
"https://picsum.photos/200?1",
"https://picsum.photos/200?2",
"https://picsum.photos/200?3",
"https://picsum.photos/200?4",
"https://picsum.photos/200?5",
"https://picsum.photos/200?6"
];

const bg = document.getElementById("bg");

images.forEach(() => {
  const img = document.createElement("img");
  img.src = images[Math.floor(Math.random() * images.length)];
  img.style.top = Math.random() * 100 + "%";
  img.style.left = Math.random() * 100 + "%";
  img.style.transform = `rotate(${Math.random() * 30}deg)`;
  bg.appendChild(img);
});

// комплименты
const texts = [
"Ты делаешь этот мир теплее просто своим присутствием 💫",
"У тебя очень редкая и красивая энергия ✨",
"С тобой даже обычный день становится особенным 🌸",
"Ты выглядишь так, будто тебя нарисовал художник 🎨",
"В тебе есть что-то, что невозможно забыть 💖",
"Ты — человек, который оставляет след в сердце 💫"
];

let i = 0;

const text = document.getElementById("text");

function show() {
  text.innerText = texts[i];
}

function next() {
  i++;
  if (i >= texts.length) {
    text.innerText = "Это всё, Лола 💖 С днём рождения!";
    return;
  }
  show();
}

show();
</script>

</body>
</html>
